name: Simple Node CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; fi

      - name: Check syntax
        run: |
          if [ -f index.js ]; then node --check index.js; fi

      - name: Run Node program
        run: |
          if [ -f index.js ]; then node index.js; else echo "No entry file found"; fi
